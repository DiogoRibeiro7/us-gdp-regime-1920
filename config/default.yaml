project:
  country_name: "United States"
  country_code_maddison: "USA"
  start_year: 1920
  end_year: null

paths:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  models_dir: "data/models"
  figures_dir: "figures"

source:
  primary: "maddison"
  download_if_missing: true
  maddison:
    doi: "doi:10.34894/INZBF2"
    dataverse_base_url: "https://dataverse.nl"
    local_excel_path: null
  fred:
    series_id: "GDPCA"
    csv_url: "https://fred.stlouisfed.org/graph/fredgraph.csv?id=GDPCA"

model:
  min_segment_size: 5
  max_breaks: 8
  criterion: "bic"
  compare_with_fred: true
  # Parametric-bootstrap replications for structural-break inference.
  # supF sequential tests are the slower step; break-date CIs are cheaper.
  break_test_bootstrap: 199
  break_date_bootstrap: 499
  # Recursively re-segment long regimes on their own variance scale so a calm
  # sub-period (e.g. the post-2000 slowdown) is not masked by the high-variance
  # 1929-1945 episode. Set false for the plain global segmentation.
  recursive_refinement: true
  max_recursion_depth: 3

plots:
  dpi: 220
